<!-- public/favicon.svg -->
<!-- Icono SVG de lista de tareas para el favicon del proyecto -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo morado redondeado usando la paleta del proyecto -->
  <rect width="32" height="32" rx="8" fill="#c762e3"/>
  <!-- Líneas que simulan una lista de tareas -->
  <rect x="8" y="10" width="16" height="2" rx="1" fill="white"/>
  <rect x="8" y="15" width="12" height="2" rx="1" fill="white"/>
  <rect x="8" y="20" width="10" height="2" rx="1" fill="white"/>
  <!-- Checkmark en la primera línea -->
  <circle cx="24" cy="11" r="3" fill="#34d399"/>
  <path d="M22.5 11l1 1 2-2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>